<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bird Maps</title>

    <!-- Description + canonical -->
    <meta name="description" content="Recent bird sightings across the United States, updated in real time from eBird." />
    <link rel="canonical" href="https://bird-maps.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bird-maps.com/" />
    <meta property="og:title" content="Bird Maps" />
    <meta property="og:description" content="Recent bird sightings across the United States, updated in real time from eBird." />
    <meta property="og:image" content="https://bird-maps.com/og-image.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bird Maps" />
    <meta name="twitter:description" content="Recent bird sightings across the United States, updated in real time from eBird." />
    <meta name="twitter:image" content="https://bird-maps.com/og-image.png" />

    <!-- Theme color (matches --color-surface-base light value from Phase 1 tokens) -->
    <meta name="theme-color" content="#f4f1ea" />

    <!-- Icons + manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect: establish TCP+TLS to critical-path cross-origin hosts during parse -->
    <link rel="preconnect" href="https://api.bird-maps.com" crossorigin>
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin>

    <!-- [data-theme] inline blocking script — added in Phase 1; verify present above this comment -->

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Bird Maps",
      "description": "Recent bird sightings across the United States, updated in real time from eBird.",
      "url": "https://bird-maps.com/",
      "inLanguage": "en-US",
      "mainEntity": {
        "@type": "Dataset",
        "name": "Recent Bird Observations Across the United States",
        "description": "Recent bird sightings across the contiguous United States, sourced from eBird (Cornell Lab of Ornithology). Updated in real time.",
        "url": "https://bird-maps.com/",
        "license": "https://www.birds.cornell.edu/home/ebird-data-access-terms-of-use/",
        "creator": {
          "@type": "Organization",
          "name": "eBird",
          "url": "https://ebird.org"
        },
        "spatialCoverage": {
          "@type": "Place",
          "name": "Contiguous United States",
          "geo": {
            "@type": "GeoShape",
            "box": "24.5 -124.8 49.4 -66.9"
          }
        },
        "dateModified": "2026-05-11",
        "temporalCoverage": "2026-04-19/..",
        "variableMeasured": "Bird species observations"
      }
    }
    </script>
    <!--
      Inline blocking script: sets [data-theme] (chrome polarity) on <html>
      before first paint to prevent FOUC. The active THEME ID is the source of
      truth; [data-theme] is DERIVED from the id's kind. Resolution:
        1. localStorage['theme'] → a known ThemeId, or the legacy chrome values
           'light'→'bright' / 'dark'→'dark' via the back-compat shim;
        2. prefers-color-scheme: dark → the 'dark' id;
        3. 'bright' — the light default (C8 · #1220 flipped this from 'positron';
           both are light-kind so [data-theme] is 'light' either way).
      Then [data-theme] = ID_TO_KIND[id].

      Both localStorage and matchMedia are wrapped in try/catch:
      Safari Private Browsing and sandboxed iframes throw SecurityError
      on storage access. Without the wrap the script would abort and
      [data-theme] would never be set, producing a FOUC.

      The resolution rules — including the ID_TO_KIND map below — are mirrored
      in src/utils/boot-theme.ts and unit-tested there. THEME_REGISTRY (in
      src/components/map/geometry/basemap-style.ts) is the SOURCE OF TRUTH for
      the id→kind kinds; this object literal duplicates them because the inline
      script can't import the module. boot-theme.test.ts imports BOTH this map
      and the module's ID_TO_KIND and asserts equality so they can never drift.
      Any change to the rules MUST be applied in both places.

      Spec: docs/design/01-spec/tokens.md §Light/dark mechanic — Epic #1221 (C7 · #1219)
    -->
    <script>
      (function () {
        // id → kind. SOURCE OF TRUTH: THEME_REGISTRY in
        // src/components/map/geometry/basemap-style.ts (duplicated here because
        // this blocking script cannot import the module; kept in sync by a test).
        var ID_TO_KIND = {
          positron: 'light',
          bright: 'light',
          liberty: 'light',
          dark: 'dark',
          fiord: 'dark'
        };
        var stored = null;
        try {
          stored = localStorage.getItem('theme');
        } catch (e) {
          // SecurityError (Safari Private Browsing, sandboxed iframe)
          // — fall through to the prefers-color-scheme branch.
        }
        // Resolve the active id. Back-compat shim (READ path only): legacy
        // chrome values 'light'→'bright' (C8 · #1220 default flip), 'dark'→'dark'.
        var id = null;
        if (stored && ID_TO_KIND.hasOwnProperty(stored)) {
          id = stored;
        } else if (stored === 'light') {
          id = 'bright';
        } else if (stored === 'dark') {
          id = 'dark';
        }
        if (id === null) {
          try {
            id = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'bright';
          } catch (e) {
            id = 'bright';
          }
        }
        document.documentElement.setAttribute('data-theme', ID_TO_KIND[id]);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
