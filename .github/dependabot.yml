version: 2
updates:
  # Single npm entry for the whole monorepo.
  #
  # npm workspaces keeps one package-lock.json at the root. A per-workspace
  # Dependabot entry would edit a workspace's package.json without touching
  # the root lockfile, breaking `npm ci`. Pointing the single entry at "/"
  # lets Dependabot walk every workspace and emit a PR that updates every
  # affected package.json *and* the root lockfile in one atomic change.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      # testcontainers core + postgresql adapter are peer-versioned; group
      # so a v-bump emits one PR instead of two-that-must-coordinate.
      testcontainers:
        patterns:
          - "testcontainers"
          - "@testcontainers/*"
    ignore:
      # node-pg-migrate major bump tracked separately by #187
      - dependency-name: "node-pg-migrate"
        update-types: ["version-update:semver-major"]
      # maplibre-gl major bump tracked separately by #188
      - dependency-name: "maplibre-gl"
        update-types: ["version-update:semver-major"]
      # vitest major bump tracked separately by #186
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      # React 19 needs a coordinated bundle (react + react-dom +
      # @types/react + @types/react-dom in one PR — split bumps break peer
      # deps). Closed #223, #226 for this reason. Re-enable after the
      # hand-crafted React 19 upgrade PR lands.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # @types/node major must track the Node runtime — which is pinned to
      # LTS via the `node` ignore on the Docker entries below. Without this
      # rule, Dependabot proposes @types/node majors ahead of the runtime
      # (e.g., #231 bumped it to 25 while Docker stays on 20).
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # @hono/node-server major bumps change adapter APIs — CLAUDE.md flags
      # hono as drift-prone; PR #233 showed a v1→v2 jump arriving unbidden.
      - dependency-name: "@hono/node-server"
        update-types: ["version-update:semver-major"]
      # vitest ignore rule only covered the bare `vitest` package; any future
      # @vitest/* scoped packages (e.g. @vitest/coverage-v8) would slip through.
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
    labels:
      - "area:infra"

  # Terraform providers (hashicorp/google, cloudflare/cloudflare, kislerdm/neon)
  - package-ecosystem: "terraform"
    directory: "/infra/terraform"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Cloudflare provider v5 requires HCL rewrites via tf-migrate
      # (cloudflare_record → cloudflare_dns_record, r2_bucket_binding shape,
      # workers_script attribute renames). Closed #201. Re-enable after a
      # coordinated v5 migration PR lands.
      - dependency-name: "cloudflare/cloudflare"
        update-types: ["version-update:semver-major"]
    labels:
      - "area:infra"

  # GitHub Actions workflow versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels:
      - "area:infra"

  # Docker base image for Read API
  - package-ecosystem: "docker"
    directory: "/services/read-api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      # Dependabot picks the latest tag regardless of LTS status, and Node
      # "Current" (odd-numbered) releases have 6-month support windows.
      # Closed #202 — it bumped to Node 25, already EOL at review time.
      # Human judgement required: bump only to the next LTS (24, then 26).
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
    labels:
      - "area:read-api"
      - "area:infra"

  # Docker base image for Ingestor
  - package-ecosystem: "docker"
    directory: "/services/ingestor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      # Same reasoning as read-api above. Closed #200.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
    labels:
      - "area:ingestor"
      - "area:infra"
