name: deploy-read-api

on:
  push:
    branches: [main]
    paths:
      - 'services/read-api/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy-read-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-read-api-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT: bird-maps-prod
  GCP_REGION: us-west1          # matches var.gcp_region default
  AR_REPO: birdwatch            # matches google_artifact_registry_repository.birdwatch.repository_id (no hyphen)
  IMAGE_NAME: read-api          # matches the image path Terraform pins in read-api.tf:40 (…/birdwatch/read-api)
  SERVICE_NAME: bird-read-api   # Cloud Run service name from read-api.tf:28

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write   # required for WIF
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -f services/read-api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Promote SHA-tagged image to :latest
        # Cloud Run Service (bird-read-api) references `read-api:latest` in
        # infra/terraform/read-api.tf:40. Without this step, :latest stays
        # pinned to whatever SHA last had it manually re-tagged — see #383
        # for the production miss this caused on the ingestor side. Re-tagging
        # on every successful push to main keeps :latest honest. Auth context
        # is reused from the google-github-actions/auth step above. The `if:`
        # guard is defense in depth — `on.push.branches` already restricts
        # triggers to main, but workflow_dispatch can fire from any branch,
        # and we only want to promote when the SHA we just pushed is on main.
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          gcloud artifacts docker tags add \
            "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}" \
            "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}:latest" \
            --project="${GCP_PROJECT}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update "$SERVICE_NAME" \
            --region="$GCP_REGION" \
            --image="$IMAGE" \
            --quiet

      - name: Smoke test
        run: |
          # Smoke-test the Cloud Run origin directly via its .run.app URL — NOT the
          # public api.bird-maps.com hostname. That hostname is proxied through
          # Cloudflare (frontend.tf: proxied = true, since #708 / 2026-05-22), and
          # CF's managed-challenge bot rule (rate-limit.tf "Layer 2") issues a 403
          # `cf-mitigated: challenge` HTML page to this runner's datacenter IP. curl
          # cannot solve a JS challenge, so the step failed on every deploy from
          # 2026-05-29 on while the deploy itself was healthy — a dead post-merge
          # canary that masks real failures. Hitting .run.app tests the exact
          # revision this job just deployed with no Cloudflare edge in the path.
          # The service is allUsers-invokable (read-api.tf:124) with default
          # ingress, so no identity token is needed.
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region="$GCP_REGION" --format='value(status.url)')
          # --retry absorbs the brief gap between `services update` returning and the
          # new revision serving; --retry-all-errors covers transient cold-start 5xx
          # without masking a genuinely broken deploy.
          curl -sSfv --retry 5 --retry-delay 3 --retry-all-errors \
            "${URL}/health" | tee /tmp/health.json
          grep -q '"ok":true' /tmp/health.json
