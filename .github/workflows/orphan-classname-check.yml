name: orphan-classname-check

# Triggers on PRs to main that touch component TSX or CSS files.
# Also runs on push to main (post-merge sanity gate).
on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/components/**/*.tsx'
      - 'frontend/src/components/**/*.ts'
      - 'frontend/src/**/*.css'
  push:
    branches: [main]
    paths:
      - 'frontend/src/components/**/*.tsx'
      - 'frontend/src/components/**/*.ts'
      - 'frontend/src/**/*.css'

jobs:
  orphan-classname-check:
    name: orphan-classname-check
    runs-on: ubuntu-latest
    # Soft-launch: continue-on-error: true for the first 7 days (until
    # 2026-05-18). After a kill-threshold review (>=7 days of clean runs,
    # <15% false-positive rate), flip to false and add the check to branch
    # protection + .mergify.yml queue_conditions.
    # See: .github/orphan-classname-allowlist.yml and CLAUDE.md drift detection section.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run orphan-classname check
        run: bash scripts/ci/check-orphan-classnames.sh
        timeout-minutes: 2
