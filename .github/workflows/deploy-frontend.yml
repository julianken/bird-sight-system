name: deploy-frontend
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false
jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build workspace dependencies
        run: |
          npm run build -w @bird-watch/shared-types
      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://api.bird-maps.com
          VITE_CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
        run: npm run build -w @bird-watch/frontend
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=birdwatch --branch=main --commit-dirty=true
