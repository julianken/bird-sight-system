name: deploy-ingestor

on:
  push:
    branches: [main]
    paths:
      - 'services/ingestor/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'scripts/purge-species-cache.sh'
      - '.github/workflows/deploy-ingestor.yml'
  workflow_dispatch:

concurrency:
  group: deploy-ingestor-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT: bird-maps-prod
  GCP_REGION: us-west1          # matches var.gcp_region default
  AR_REPO: birdwatch            # matches google_artifact_registry_repository.birdwatch.repository_id (no hyphen)
  IMAGE_NAME: ingestor          # matches the image path Terraform pins in ingestor.tf (…/birdwatch/ingestor)
  JOB_NAME: bird-ingestor       # Cloud Run job name from ingestor.tf:32

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write   # required for WIF
    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -f services/ingestor/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Promote SHA-tagged image to :latest
        # Cloud Run Jobs (bird-ingestor, bird-ingestor-photos,
        # bird-ingestor-descriptions) and the read-api Service all reference
        # `<image>:latest` in infra/terraform/. Without this step, :latest
        # stays pinned to whatever SHA last had it manually re-tagged — which
        # caused the 2026-05-03 production miss documented in #383 (the
        # descriptions Cloud Run Job pulled a 2026-04-19 image that pre-dated
        # the `descriptions` kind). Re-tagging on every successful push to
        # main keeps :latest honest. Auth context is reused from the
        # google-github-actions/auth step above. The `if:` guard is defense in
        # depth — `on.push.branches` already restricts triggers to main, but
        # workflow_dispatch can fire from any branch, and we only want to
        # promote when the SHA we just pushed is on main.
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          gcloud artifacts docker tags add \
            "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}" \
            "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/${IMAGE_NAME}:latest" \
            --project="${GCP_PROJECT}"

      - name: Deploy to Cloud Run Jobs
        run: |
          # Two jobs share this image: bird-ingestor (the original — recent /
          # hotspots / backfill / taxonomy kinds, 300s timeout) and
          # bird-ingestor-photos (added in #327 task-8b — photos kind,
          # 600s timeout). Both dispatch through cli.ts on the kind arg.
          # If the photos job doesn't exist yet (Terraform apply hasn't been
          # run since #327 task-8b merged), skip rather than fail the deploy
          # — the next deploy after apply picks up this image automatically.
          for JOB in bird-ingestor bird-ingestor-photos; do
            if gcloud run jobs describe "$JOB" --region="$GCP_REGION" >/dev/null 2>&1; then
              echo "Updating $JOB to $IMAGE"
              gcloud run jobs update "$JOB" \
                --region="$GCP_REGION" \
                --image="$IMAGE" \
                --quiet
            else
              echo "Job $JOB does not exist yet — skipping (terraform apply pending for #327 task-8b?)"
            fi
          done

      - name: Verify image pinned
        run: |
          # Cloud Run Jobs aren't HTTP endpoints, so we can't curl a /health URL the way
          # deploy-read-api does. The closest equivalent is verifying each job resource now
          # points at the commit-SHA image tag we just pushed. This confirms the update
          # succeeded end-to-end (auth → AR push → Cloud Run control plane) without burning
          # a live ingest run on every deploy. Schedulers bind to jobs by name, so they
          # pick up the new image on their next tick automatically.
          for JOB in bird-ingestor bird-ingestor-photos; do
            if gcloud run jobs describe "$JOB" --region="$GCP_REGION" >/dev/null 2>&1; then
              DEPLOYED=$(gcloud run jobs describe "$JOB" \
                --region="$GCP_REGION" \
                --format='value(spec.template.spec.template.spec.containers[0].image)')
              echo "Deployed image for $JOB: $DEPLOYED"
              echo "Expected image:        $IMAGE"
              test "$DEPLOYED" = "$IMAGE"
            else
              echo "Job $JOB not provisioned — verification skipped"
            fi
          done
