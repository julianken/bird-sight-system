name: deploy-infra

# Plan-only CI preview for infra — the post-merge half of the infra pipeline (#825).
#
# The infra deploy model is MANUAL `terraform apply`: the operator runs apply
# locally after reviewing the plan this workflow posts (mirrors how
# `terraform-plan-drift-check.yml` already operates). This workflow does NOT
# apply anything — every merge to `main` that touches infra produces a
# human-readable, sensitive-masked plan in the run summary so the operator has a
# concrete, reviewed diff to apply by hand.
#
# ONE job by design (`plan`): checkout → auth (WIF) → setup-gcloud →
# setup-terraform → `terraform init` → `terraform plan -out=tfplan` →
# post `terraform show -no-color tfplan` to the job summary. The `tfplan` binary
# is written only into the ephemeral runner workspace (destroyed at job end) so
# the summary step can render the masked plan from it — it is never uploaded as
# an artifact and never persisted anywhere downloadable.
#
# Pairs with `terraform-plan-drift-check.yml` (nightly read-only drift watcher,
# the safety net for out-of-band / console drift) and #242 (PR-time
# `validate`/`plan`, the pre-merge gate). Apply is performed manually by the
# operator after reviewing this plan.
#
# Security invariants (inherited from the drift-check workflow):
#   1. Never echo `terraform show -json` / plan internals — they contain live
#      DB passwords + CF/eBird tokens under `variables[].value`. The plan summary
#      uses `terraform show -no-color` (the sensitive TF vars mask) — never -json,
#      and never raw var values.
#   2. `pull_request` is deliberately NOT a trigger; this workflow uses
#      repo-scoped secrets that must not be reachable from fork PRs.

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:

concurrency:
  # Serialize plan runs so two runs can't race the GCS state lock. cancel-in-progress
  # is FALSE (mirrors deploy-read-api.yml:15-17, NOT drift-check's `true`):
  # `terraform plan` takes a read lock against the shared state, and cancelling
  # mid-flight can orphan that lock. Paired with the -lock-timeout below so a
  # concurrent nightly plan queues rather than errors.
  group: deploy-infra-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read        # checkout
  id-token: write       # WIF -> GCP (GCS backend + google/cloudflare provider auth)

env:
  # Hardcodeable literals (not secrets) — match terraform-plan-drift-check.yml.
  TF_VAR_domain: bird-maps.com
  TF_VAR_gcp_project_id: bird-maps-prod
  TF_VAR_gcp_region: us-west1
  # Suppress provider colourisation for cleaner log parsing.
  TF_CLI_ARGS: "-no-color"
  # Telemetry opt-out — nothing about this CI run should phone HashiCorp.
  CHECKPOINT_DISABLE: "1"

jobs:
  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Plan-only preview: this job posts the plan to the run summary; the operator
    # reviews it and runs `terraform apply` manually. No `environment:` gate and
    # no apply step — this workflow never mutates infra.

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          # Matches infra/terraform/versions.tf required_version (>= 1.6.0) and
          # the pin used by terraform-plan-drift-check.yml.
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: terraform init
        run: terraform init -input=false -lock-timeout=120s

      - name: terraform plan
        id: plan
        env:
          # Secrets that must reach provider/variable blocks. If any required one
          # is unset, `terraform plan` errors loudly — desired.
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_ebird_api_key: ${{ secrets.EBIRD_API_KEY }}
          TF_VAR_deployer_service_account_email: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}
          # REQUIRED: gcp_billing_account_id has no default in variables.tf:40 and
          # is consumed unconditionally by budget.tf:23, so it participates in
          # every plan. Without the GCP_BILLING_ACCOUNT_ID secret, plan dies with
          # `No value for required variable` before producing a tfplan.
          # (Neon is decommissioned — no kislerdm/neon provider, no neon_* vars —
          # so TF_VAR_neon_* is intentionally omitted.)
          TF_VAR_gcp_billing_account_id: ${{ secrets.GCP_BILLING_ACCOUNT_ID }}
        run: |
          # Save the plan to the ephemeral runner workspace so the summary step
          # below can render the masked human-readable diff from it. The binary is
          # never uploaded or persisted — it dies with the runner at job end.
          terraform plan -out=tfplan -input=false -lock-timeout=120s
          # Human-readable plan to the job summary so the operator can review the
          # diff before running `terraform apply` manually. -no-color (NOT -json):
          # the sensitive TF vars mask under `show`, and we never echo raw var
          # values.
          {
            echo "## terraform plan"
            echo
            echo '```'
            terraform show -no-color tfplan | tail -n 200
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
