name: knip

on:
  pull_request:
  push:
    branches: [main]

jobs:
  knip:
    name: knip (informational)
    runs-on: ubuntu-latest
    # Informational check — does NOT block merge.  Not in .mergify.yml conditions.
    # Findings are visible as workflow annotations for triage; they do not gate PRs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json
          cache: npm
      - run: npm ci
      - run: npx knip --no-progress
